let activeTab = "perfil";
let activePhase = 0;
let completed = {};
let expandedCity = null;

function setTab(id) { activeTab = id; render(); }
function setPhase(i) { activePhase = i; render(); }
function toggleTask(k) { completed[k] = !completed[k]; render(); }
function toggleCity(i) { expandedCity = expandedCity === i ? null : i; render(); }

function getProgress(ph) {
  let t=0,d=0;
  ph.sections.forEach((s,si) => s.tasks.forEach((_,ti) => { t++; if(completed[`${ph.id}-${si}-${ti}`]) d++; }));
  return t ? Math.round(d/t*100) : 0;
}

function pColor(p) { return p==="alta"?"#FF1744":p==="media"?"#FF9100":"#00B0FF"; }
function prioColor(p) { return p<=2?"#FF1744":p<=3?"#FF9100":"#448AFF"; }
function prioBg(p) { return p<=2?"rgba(255,23,68,.12)":p<=3?"rgba(255,145,0,.12)":"rgba(68,138,255,.12)"; }

    DATA.team.forEach(fase => {
      h += `<div class="card" style="border-color:${fase.faseColor}20;padding-bottom:8px">`;
      h += `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px"><div><h3 style="font-size:14px;font-weight:800;color:${fase.faseColor};margin-bottom:2px">${fase.fase}</h3><span class="mono" style="font-size:10px;color:#6B7394">${fase.time}</span></div><div style="text-align:right"><div style="font-size:12px;font-weight:700;color:#FFD600">${fase.personas}</div><div class="mono" style="font-size:10px;color:#7A84A0">${fase.costoMes}</div></div></div>`;

      fase.roles.forEach(role => {
        h += `<div style="background:rgba(255,255,255,.02);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid ${role.color}">`;
        h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px"><div style="font-size:13px;font-weight:700;color:${role.color}">${role.titulo}</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
        h += `<span class="mono" style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.05);color:#A0AAC0">${typeof role.cant === 'number' ? role.cant + ' persona' + (role.cant > 1 ? 's':'') : role.cant + ' personas'}</span>`;
        h += `<span class="mono" style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.05);color:#A0AAC0">${role.tipo}</span>`;
        if(role.salario !== "—" && role.salario !== "Según inversión") h += `<span class="mono" style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(0,230,118,.08);color:#00E676">${role.salario}</span>`;
        h += `</div></div>`;
        role.funciones.forEach(f => {
          h += `<div style="display:flex;gap:6px;margin-bottom:3px;font-size:11px;color:#A0AAC0;line-height:1.5"><span style="color:${role.color};flex-shrink:0">›</span>${f}</div>`;
        });
        h += `</div>`;
      });

      if(fase.nota) h += `<div style="margin-top:4px;padding:8px 10px;background:rgba(255,214,0,.05);border-radius:8px;font-size:11px;color:#D4C47A;line-height:1.5">💡 ${fase.nota}</div>`;
      h += `</div>`;
    });

    // Summary table
    h += `<div class="card" style="border-color:rgba(255,255,255,.08)"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:#FFD600">📊 Resumen de Crecimiento del Equipo</h3>`;
    [{f:"F1-2",t:"Mes 0-1",p:"2-3",c:"$150-300",i:"$750-800",r:"Viable desde membresías"},{f:"F3",t:"Mes 2-3",p:"4-5",c:"$500-800",i:"$3,000-4,000",r:"Equipo se paga con membresías"},{f:"F4",t:"Mes 4-8",p:"8-12",c:"$1,500-3,000",i:"$15,000-20,000",r:"Margen de ganancia amplio"},{f:"F5",t:"Mes 9-12",p:"15-20",c:"$4,000-7,000",i:"$45,000-60,000",r:"Escala + inversión"}].forEach((r,i) => {
      h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;${i?'border-top:1px solid rgba(255,255,255,.04)':''}"><div><div style="font-size:12px;font-weight:600;color:#D0D8F0">${r.f} · ${r.t}</div><div style="font-size:10px;color:#6B7394">${r.p} personas · Costo: ${r.c}/mes</div></div><div style="text-align:right"><div class="mono" style="font-size:13px;font-weight:700;color:#00E676">${r.i}/mes</div><div style="font-size:9px;color:#7A84A0">${r.r}</div></div></div>`;
    });
    h += `</div>`;

    // Key insight
    h += `<div class="card" style="background:linear-gradient(135deg,#111628,#0D1628);border-color:rgba(255,255,255,.08)"><h3 style="font-size:14px;font-weight:700;margin-bottom:8px;color:#00E676">⚡ Contrataciones Clave en Orden de Prioridad</h3>`;
    [{n:"1º Captador de Conductores",w:"Desde el día 1",why:"Sin conductores no hay app. Esta persona va a la calle a reclutar mientras tú desarrollas."},{n:"2º Community Manager",w:"Semana 1",why:"Las RRSS deben existir antes del lanzamiento. Sin presencia digital, no generas confianza."},{n:"3º Coordinador de Operaciones",w:"Mes 2",why:"Te libera de la operación diaria para enfocarte en producto y estrategia."},{n:"4º Desarrollador Full-Stack",w:"Mes 4",why:"Para iOS, nuevas features y escalar. Claude Code ayuda pero necesitas alguien dedicado."},{n:"5º COO (Director Operaciones)",w:"Mes 9",why:"Gestiona toda la operación nacional. Tú te enfocas 100% en crecimiento e inversión."}].forEach((c,i) => {
      h += `<div style="padding:8px 0;${i?'border-top:1px solid rgba(255,255,255,.04)':''}"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:700;color:#D0D8F0">${c.n}</span><span class="mono" style="font-size:10px;color:#448AFF">${c.w}</span></div><div style="font-size:11px;color:#8892B0;line-height:1.4">${c.why}</div></div>`;
    });
    h += `</div>`;
  }

  else if (activeTab === "claude") {
    h += `<h2 style="font-size:18px;font-weight:800;margin-bottom:4px">Herramientas Claude para Higo</h2><p style="font-size:12px;color:#7A84A0;margin-bottom:16px">Cómo usar Claude Code y Claude Cowork para acelerar cada fase</p>`;
    // Claude Code
    h += `<div class="card" style="border-color:rgba(255,109,0,.15)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:32px;height:32px;border-radius:8px;background:#FF6D00;display:flex;align-items:center;justify-content:center;font-size:16px">⌨️</div><div><h3 style="font-size:16px;font-weight:800;color:#FF6D00">Claude Code</h3><p class="mono" style="font-size:10px;color:#7A84A0">DESARROLLO · TERMINAL</p></div></div><p style="font-size:11px;color:#8892B0;margin-bottom:12px;line-height:1.5">Herramienta de línea de comandos. Lee tu codebase, escribe archivos, ejecuta comandos y hace debugging desde la terminal.</p><div style="font-size:12px;font-weight:600;color:#FF6D00;margin-bottom:8px">Tareas para Higo:</div>`;
    DATA.claudeCode.forEach(g => {
      h += `<div class="claude-group"><div class="claude-phase" style="color:#FF6D00;background:#FF6D0010">${g.fase}</div>`;
      g.tasks.forEach(t => h += `<div class="claude-task"><span style="color:#FF6D00">›</span>${t}</div>`);
      h += `</div>`;
    });
    h += `</div>`;
    // Claude Cowork
    h += `<div class="card" style="border-color:rgba(68,138,255,.15)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:32px;height:32px;border-radius:8px;background:#448AFF;display:flex;align-items:center;justify-content:center;font-size:16px">🖥️</div><div><h3 style="font-size:16px;font-weight:800;color:#448AFF">Claude Cowork</h3><p class="mono" style="font-size:10px;color:#7A84A0">CONOCIMIENTO · DESKTOP</p></div></div><p style="font-size:11px;color:#8892B0;margin-bottom:12px;line-height:1.5">Herramienta de escritorio para trabajo de conocimiento. Accede a archivos locales, crea documentos, spreadsheets, presentaciones. Trabaja autónomo vía Dispatch desde el celular.</p><div style="font-size:12px;font-weight:600;color:#448AFF;margin-bottom:8px">Tareas para Higo:</div>`;
    DATA.claudeCowork.forEach(g => {
      h += `<div class="claude-group"><div class="claude-phase" style="color:#448AFF;background:#448AFF10">${g.fase}</div>`;
      g.tasks.forEach(t => h += `<div class="claude-task"><span style="color:#448AFF">›</span>${t}</div>`);
      h += `</div>`;
    });
    h += `</div>`;
    // Dispatch
    h += `<div class="card" style="border-color:rgba(170,0,255,.15)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:32px;height:32px;border-radius:8px;background:#AA00FF;display:flex;align-items:center;justify-content:center;font-size:16px">📲</div><div><h3 style="font-size:16px;font-weight:800;color:#AA00FF">Dispatch (Cowork Mobile)</h3><p class="mono" style="font-size:10px;color:#7A84A0">TAREAS DESDE EL CELULAR</p></div></div><p style="font-size:11px;color:#8892B0;margin-bottom:12px;line-height:1.5">Envía tareas a Claude desde tu teléfono mientras estás reclutando conductores, en un evento, o viajando.</p>`;
    DATA.dispatch.forEach(ex => h += `<div class="dispatch-item"><span style="color:#AA00FF">📱</span>${ex}</div>`);
    h += `</div>`;
    // Summary
    h += `<div class="card" style="background:linear-gradient(135deg,#111628,#0D1628);border-color:rgba(255,255,255,.08)"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:#FFD600">⚡ Resumen: Quién Hace Qué</h3>`;
    [{t:"Claude Code ⌨️",c:"#FF6D00",d:"Todo CÓDIGO: features, bugs, APIs, iOS, analytics, infraestructura"},{t:"Claude Cowork 🖥️",c:"#448AFF",d:"Todo CONTENIDO: marketing, reportes, spreadsheets, presentaciones, investigación"},{t:"Dispatch 📲",c:"#AA00FF",d:"SOBRE LA MARCHA: tareas desde el celular mientras trabajas en la calle"},{t:"Claude Chat 💬",c:"#00E676",d:"Estrategia, brainstorming, análisis — como esta conversación"}].forEach(i => h += `<div class="summary-row"><span class="summary-tool" style="color:${i.c}">${i.t}</span><span class="summary-desc">${i.d}</span></div>`);
    h += `</div>`;
  }

  else if (activeTab === "estrategia") {
    h += `<h2 style="font-size:18px;font-weight:800;margin-bottom:12px">Estrategia y Tácticas</h2>`;
    DATA.strategy.forEach(n => {
      h += `<div class="card" style="border-color:${n.color}12"><h3 style="font-size:13px;font-weight:700;margin-bottom:8px;color:${n.color}">${n.title}</h3>`;
      n.items.forEach(i => h += `<div class="strategy-item"><span style="color:${n.color}">▸</span>${i}</div>`);
      h += `</div>`;
    });
  }

  C.innerHTML = h;
}

render();
</script>
</body>
</html>
