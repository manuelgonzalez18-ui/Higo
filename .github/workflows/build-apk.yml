name: Build Android APK

# Se dispara manualmente (Actions → Build Android APK → Run workflow)
# o cuando se crea un tag v*. Genera:
#   - AAB release firmado (para subir a Play Store)
#   - APK release firmado (para instalar y testear en device real)
# Ambos quedan como artifacts del run durante 14 días.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Maps key SEPARADO del de web (deploy.yml usa VITE_GOOGLE_MAPS_API_KEY,
          # restringido a 'Sitios web' con higoapp.com/*). La APK corre dentro de
          # una webview Capacitor cuyo referer es capacitor://localhost — no matchea
          # la restriccion web. Por eso usamos otra clave (ANDROID_GOOGLE_MAPS_API_KEY)
          # restringida a 'Apps para Android' con com.higoapp.ve + SHA-1.
          # Si al runtime la clave Android no valida via X-Android-Package/Cert
          # desde la webview, cambiar la restriccion a 'Ninguno' en GCP Console.
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.ANDROID_GOOGLE_MAPS_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Grant execute permission on gradlew
        run: chmod +x android/gradlew

      # Decodifica el keystore desde el GitHub Secret ANDROID_KEYSTORE_BASE64
      # y lo escribe en android/app/release-key.jks justo antes del build.
      # El archivo ya NO vive en el repo (ver .gitignore). Para generar el
      # secret: base64 -w0 release-key.jks (Linux) o
      # base64 -i release-key.jks -o keystore.b64 (macOS), después pegar el
      # contenido en Settings > Secrets > ANDROID_KEYSTORE_BASE64.
      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 no está configurado. Cargalo en Settings > Secrets and variables > Actions."
            exit 1
          fi
          # Diagnóstico (NO revela el secret, solo longitudes y conteo de
          # chars fuera del alfabeto base64). Esperado: raw≈3664, clean=3664,
          # non_b64=0. Si raw difiere mucho de 3664 → secret truncado o con
          # BOM/UTF-16. Si non_b64>0 → caracteres inválidos (encoding raro).
          raw_len=$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | wc -c)
          cleaned=$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]')
          clean_len=$(printf '%s' "$cleaned" | wc -c)
          non_b64=$(printf '%s' "$cleaned" | tr -d 'A-Za-z0-9+/=' | wc -c)
          echo "Diagnóstico secret → raw_len=$raw_len clean_len=$clean_len non_b64_chars=$non_b64 (esperado: ~3664 / 3664 / 0)"

          # Strip de TODO whitespace + caracteres fuera del alfabeto base64
          # estándar. Cubre saltos de línea, CR, BOM y basura de encoding del
          # copy-paste (PowerShell/Windows). base64 -d produce basura
          # silenciosamente con cualquiera de esos chars.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -cd 'A-Za-z0-9+/=' | base64 -d > android/app/release-key.jks
          # Sanity check: si el secret quedó mal codificado, keytool fallaría
          # con mensajes crípticos. Validar el magic byte JKS (0xFEEDFEED).
          if ! head -c 4 android/app/release-key.jks | xxd -p | grep -qi '^feedfeed'; then
            echo "::error::release-key.jks decodificado NO tiene magic JKS. Revisar que ANDROID_KEYSTORE_BASE64 sea base64 puro del .jks (sin comillas ni texto extra). Largo esperado del secret: 3664 chars."
            exit 1
          fi
          echo "✓ Keystore decodificado ($(stat -c%s android/app/release-key.jks) bytes)"

      # Genera el AAB (Android App Bundle) firmado para Play Store y el
      # APK release firmado para testear en dispositivo real. Ambos usan
      # el signingConfig 'release' definido en android/app/build.gradle
      # (keystore release-key.jks, decodificado en el step anterior).
      - name: Build Release AAB + APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      # Limpieza: borramos el keystore decodificado por las dudas — el runner
      # se descarta igual al final del job, pero defense-in-depth nunca está
      # de más con material criptográfico. `always()` para que corra incluso
      # si el build falla.
      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/release-key.jks

      - name: Rename artifacts with commit SHA
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          cp android/app/build/outputs/bundle/release/app-release.aab higo-${SHORT_SHA}-release.aab
          cp android/app/build/outputs/apk/release/app-release.apk    higo-${SHORT_SHA}-release.apk
          ls -lh higo-*.aab higo-*.apk

      # AAB: para subir a Play Console (Production / Internal testing).
      - name: Upload AAB artifact (for Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: higo-release-aab
          path: higo-*-release.aab
          retention-days: 14

      # APK: para instalar y testear en device antes de subir.
      - name: Upload APK artifact (for device testing)
        uses: actions/upload-artifact@v4
        with:
          name: higo-release-apk
          path: higo-*-release.apk
          retention-days: 14

      - name: Attach to GitHub release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            higo-*-release.aab
            higo-*-release.apk
          generate_release_notes: true
