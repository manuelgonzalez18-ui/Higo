name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build Project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FCM_VAPID_KEY: ${{ secrets.VITE_FCM_VAPID_KEY }}
        run: |
          echo "=== ENV DIAGNOSTIC (lengths only, no values) ==="
          echo "VITE_SUPABASE_URL length: ${#VITE_SUPABASE_URL}"
          echo "VITE_SUPABASE_ANON_KEY length: ${#VITE_SUPABASE_ANON_KEY}"
          echo "VITE_GOOGLE_MAPS_API_KEY length: ${#VITE_GOOGLE_MAPS_API_KEY}"
          echo "VITE_GEMINI_API_KEY length: ${#VITE_GEMINI_API_KEY}"
          echo "VITE_FIREBASE_API_KEY length: ${#VITE_FIREBASE_API_KEY}"
          echo "VITE_FIREBASE_PROJECT_ID length: ${#VITE_FIREBASE_PROJECT_ID}"
          echo "================================================="
          if [[ ! "$VITE_GOOGLE_MAPS_API_KEY" =~ ^AIza[0-9A-Za-z_-]{35}$ ]]; then
            echo "::error::VITE_GOOGLE_MAPS_API_KEY no tiene formato valido de Google API key (esperado: AIza + 35 chars alfanumericos/_-, total 39; recibido: ${#VITE_GOOGLE_MAPS_API_KEY} chars). Revisa el secret en GitHub: Settings > Secrets and variables > Actions. Causa comun: espacios, saltos de linea o comillas al pegar."
            exit 1
          fi
          npm run build

      # lftp con xfer:clobber on + ftp:use-allo off para que suba cada
      # archivo con su nombre final y evite el patron .in.<file> + rename
      # que Hostinger rompe (su antivirus/sync quita dotfiles antes del
      # rename y devuelve 550 No such file or directory).
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # NOTA sobre --no-perms:
      # Hostinger no le permite a este FTP user hacer `SITE CHMOD`. lftp
      # por default intenta preservar permisos del archivo local y emite
      # un chmod después de cada PUT, lo que devuelve 550 y aborta todo
      # el mirror. `--no-perms` lo saltea — los archivos quedan con los
      # perms default del usuario FTP (typically 644 / 755), que es lo
      # que necesitamos.
      #
      # NOTA sobre --delete:
      # Con chunks hasheados (vite.config.js: chunkFileNames con [hash])
      # cada build produce nombres únicos. `mirror --delete` intenta
      # borrar los hashes viejos del server, pero el antivirus de
      # Hostinger los suele tener lockeados al momento del DELETE y
      # devuelve "550 No such file" → lftp exit 1 → workflow rojo
      # AUNQUE el upload de los archivos nuevos haya completado bien.
      #
      # Solución: dropear --delete. Los chunks viejos quedan huérfanos
      # (5-30KB cada uno, ningún index.html actual los referencia, no
      # rompen nada). Si la acumulación molesta a futuro, una limpieza
      # manual periódica via FileZilla o un cron de Hostinger barre
      # `dist/assets/*-<hash>.js` con timestamp > 30 días.
      #
      # .builds/ lo crea el sistema interno de Hostinger; lo seguimos
      # excluyendo por las dudas.
      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set net:timeout 60;
          set net:max-retries 10;
          set net:reconnect-interval-base 5;
          set net:reconnect-interval-multiplier 1.5;
          set xfer:clobber on;
          set ftp:use-allo off;
          set mirror:parallel-transfer-count 1;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
          mirror --reverse --verbose --parallel=1 --no-perms --exclude-glob .ftp-deploy-sync-state.json --exclude '(^|\/)\.builds(\/|$)' ./dist/ ./;
          "

      # higodriver.com vive en un hosting Hostinger separado (FTP user
      # u841591024.higodriver.com, path public_html). Subimos ./higodriver/
      # entero, no solo el .php — incluye también el index.html del landing.
      #
      # Guard: si el secret HIGODRIVER_FTP_PASSWORD no está configurado,
      # skipeamos sin romper el job — útil mientras se cargan los secrets.
      - name: Deploy higodriver via lftp
        env:
          HIGODRIVER_FTP_SERVER: ${{ secrets.HIGODRIVER_FTP_SERVER }}
          HIGODRIVER_FTP_USERNAME: ${{ secrets.HIGODRIVER_FTP_USERNAME }}
          HIGODRIVER_FTP_PASSWORD: ${{ secrets.HIGODRIVER_FTP_PASSWORD }}
        run: |
          if [ -z "$HIGODRIVER_FTP_PASSWORD" ]; then
            echo "::warning::HIGODRIVER_FTP_PASSWORD no está configurado — skipeando deploy de higodriver.com. Agregalo en Settings > Secrets para habilitar."
            exit 0
          fi
          lftp -c "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set net:timeout 60;
          set net:max-retries 10;
          set net:reconnect-interval-base 5;
          set net:reconnect-interval-multiplier 1.5;
          set xfer:clobber on;
          set ftp:use-allo off;
          set mirror:parallel-transfer-count 1;
          open -u '$HIGODRIVER_FTP_USERNAME','$HIGODRIVER_FTP_PASSWORD' '$HIGODRIVER_FTP_SERVER';
          mirror --reverse --verbose --parallel=1 --no-perms --exclude-glob .ftp-deploy-sync-state.json --exclude '(^|\/)\.builds(\/|$)' ./higodriver/ ./;
          "
