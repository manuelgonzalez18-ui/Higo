name: Higo Guardian (12h)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-security-check:
    name: Bug & Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Security audit (all dependencies)
        run: npm audit --audit-level=high

      - name: Create issue when checks fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[Guardian] Bug/security checks failed - ${new Date().toISOString()}`;
            const body = [
              'El agente automático de revisión detectó fallas en el barrido de bugs/seguridad.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              'Revisa el log y corrige los problemas detectados.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'security', 'automated-check']
            });
